<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARC Network | Expert Terminal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js" type="application/javascript"></script>
</head>
<body>
    <div class="dashboard-wrapper">
        <header class="stats-grid">
            <div class="stat-card">
                <span class="label">Bloco Atual</span>
                <div id="current-block" class="value">---</div>
            </div>
            <div class="stat-card">
                <span class="label">Total de Transações</span>
                <div id="total-transactions" class="value">---</div>
            </div>
            <div class="stat-card">
                <span class="label">USDC Market Cap</span>
                <div id="usdc-market-cap" class="value">---</div>
            </div>
            <div class="stat-card">
                <span class="label">Finalidade</span>
                <div id="tempo-finalidade" class="value">1.50s</div>
            </div>
        </header>

        <main class="transaction-container">
            <div class="table-header">
                <h3><i class="fas fa-bolt" style="color: #f1c40f;"></i> Live Network Activity</h3>
                <div class="live-status">
                    <span class="pulse-dot"></span>
                    <span class="live-text">REAL-TIME FEED</span>
                </div>
            </div>
            
            <div class="table-responsive">
                <table class="expert-table">
                    <thead>
                        <tr>
                            <th>Status</th>
                            <th>Hash da Transação</th>
                            <th>Ação</th>
                            <th class="text-right">Valor (USDC)</th>
                            <th class="text-right">Gás/Taxa</th>
                        </tr>
                    </thead>
                    <tbody id="recent-transactions-list">
                        </tbody>
                </table>
            </div>
        </main>

        <section id="big-transactions" class="whale-section">
            </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
